name: TCA CI

on:
  push:
    branches: [main]
    paths:
      - 'tui-coding-agent/**'
  pull_request:
    branches: [main]
    paths:
      - 'tui-coding-agent/**'
  workflow_dispatch:

defaults:
  run:
    working-directory: tui-coding-agent

jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node-version: ["22.19.0"]

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
          cache-dependency-path: 'tui-coding-agent/package-lock.json'

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Run tests
        run: npm test

  build-sandbox:
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: windows-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22.19.0"
          cache: npm
          cache-dependency-path: 'tui-coding-agent/package-lock.json'

      - name: Install dependencies
        run: npm ci

      - name: Build Windows sandbox helper
        shell: pwsh
        run: node scripts/build-sandbox-helper.mjs

      - name: Upload sandbox helper artifact
        uses: actions/upload-artifact@v4
        with:
          name: sandbox-helper-win-x64
          path: tui-coding-agent/bin/sandbox-helper.exe
          if-no-files-found: error
